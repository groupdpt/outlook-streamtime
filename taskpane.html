<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Streamtime Jobs</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3352;
      --accent: #4f8ef7;
      --accent-glow: rgba(79,142,247,0.15);
      --text: #e8ecf4;
      --muted: #6b7399;
      --success: #3ecf8e;
      --error: #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 14px;
      min-height: 100vh;
    }

    /* ── Setup screen ──────────────────────────────────────── */
    #setupScreen {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .setup-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .setup-sub {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    .setup-sub a {
      color: var(--accent);
      text-decoration: none;
    }

    label {
      font-size: 11px;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 11px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .error-msg {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 7px;
      padding: 9px 11px;
      font-size: 11px;
      color: var(--error);
      display: none;
    }

    /* ── Main screen ───────────────────────────────────────── */
    #mainScreen { display: none; flex-direction: column; gap: 10px; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .header-left { display: flex; align-items: center; gap: 8px; }

    .logo {
      width: 26px; height: 26px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
      font-family: 'DM Mono', monospace;
      flex-shrink: 0;
    }

    .header h1 { font-size: 13px; font-weight: 600; }

    .settings-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 4px; border-radius: 4px;
      transition: color 0.15s;
    }
    .settings-btn:hover { color: var(--text); }

    .search-wrap { position: relative; }

    .search-icon {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }

    #searchInput {
      width: 100%;
      padding: 9px 11px 9px 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
    }

    .stats-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 2px;
    }

    .stats-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
    .stats-count span { color: var(--accent); font-weight: 500; }

    .refresh-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 11px; font-family: 'DM Mono', monospace;
      display: flex; align-items: center; gap: 4px;
      padding: 3px 6px; border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .refresh-btn:hover { color: var(--accent); background: var(--accent-glow); }
    .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #jobList {
      display: flex; flex-direction: column; gap: 4px;
      max-height: calc(100vh - 190px);
      overflow-y: auto; padding-right: 2px;
    }
    #jobList::-webkit-scrollbar { width: 4px; }
    #jobList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .job-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 11px;
      cursor: pointer; display: flex; flex-direction: column; gap: 3px;
      transition: border-color 0.12s, background 0.12s, transform 0.1s;
      animation: fadeIn 0.18s ease both;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
    .job-item:hover { border-color: var(--accent); background: var(--surface2); transform: translateX(1px); }

    .job-name { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.3; }
    .job-name mark { background: var(--accent-glow); color: var(--accent); border-radius: 2px; padding: 0 1px; }
    .job-meta { display: flex; gap: 7px; align-items: center; }
    .job-code {
      font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 3px; padding: 1px 5px;
    }
    .job-client { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .state-msg { text-align: center; padding: 28px 16px; color: var(--muted); }
    .state-msg .icon { font-size: 26px; margin-bottom: 8px; display: block; }
    .state-msg p { font-size: 12px; line-height: 1.5; }

    #toast {
      position: fixed; bottom: 14px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--success); color: #0f1117;
      font-weight: 600; font-size: 11px; font-family: 'DM Mono', monospace;
      padding: 6px 14px; border-radius: 20px;
      opacity: 0; transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- ── SETUP SCREEN ────────────────────────────────────── -->
  <div id="setupScreen">
    <div class="setup-title">Connect to Streamtime</div>
    <p class="setup-sub">
      You only need to do this once.<br/><br/>
      1. In Streamtime go to <strong>Settings → Integrations → API</strong> and click <strong>Connect</strong> to get your API key.<br/><br/>
      2. Paste your Cloudflare Worker URL and API key below.
    </p>

    <div>
      <label>Cloudflare Worker URL</label>
      <input type="text" id="workerUrl" placeholder="https://your-worker.workers.dev"/>
    </div>

    <div>
      <label>Streamtime API Key</label>
      <input type="password" id="apiKey" placeholder="Paste your API key here"/>
    </div>

    <div class="error-msg" id="setupError"></div>
    <button class="btn" id="connectBtn" onclick="connect()">Connect & Load Jobs</button>
  </div>

  <!-- ── MAIN SCREEN ─────────────────────────────────────── -->
  <div id="mainScreen">
    <div class="header">
      <div class="header-left">
        <div class="logo">ST</div>
        <h1>Streamtime Jobs</h1>
      </div>
      <button class="settings-btn" title="Change settings" onclick="showSetup()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search jobs or clients…" autocomplete="off"/>
    </div>

    <div class="stats-bar">
      <div class="stats-count" id="statsCount">Loading…</div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadJobs()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
        Refresh
      </button>
    </div>

    <div id="jobList"></div>
  </div>

  <div id="toast"></div>

  <script>
    let allJobs = [];
    let officeReady = false;

    Office.onReady(() => { officeReady = true; });

    // ── On load: check if already configured ──────────────────
    window.addEventListener('load', () => {
      const workerUrl = localStorage.getItem('st_worker_url');
      const apiKey    = localStorage.getItem('st_api_key');
      if (workerUrl && apiKey) {
        showMain();
        loadJobs();
      }
    });

    // ── Setup / connect ───────────────────────────────────────
    async function connect() {
      const workerUrl = document.getElementById('workerUrl').value.trim().replace(/\/$/, '');
      const apiKey    = document.getElementById('apiKey').value.trim();
      const errEl     = document.getElementById('setupError');
      const btn       = document.getElementById('connectBtn');

      errEl.style.display = 'none';

      if (!workerUrl || !apiKey) {
        showSetupError('Please fill in both fields.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Connecting…';

      try {
        const res = await fetchJobs(workerUrl, apiKey);
        localStorage.setItem('st_worker_url', workerUrl);
        localStorage.setItem('st_api_key', apiKey);
        allJobs = res;
        showMain();
        renderJobs(allJobs, '');
        setStats(`<span>${allJobs.length}</span> jobs loaded`);
      } catch (err) {
        showSetupError(`Could not connect: ${err.message}`);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Connect & Load Jobs';
      }
    }

    function showSetupError(msg) {
      const el = document.getElementById('setupError');
      el.textContent = msg;
      el.style.display = 'block';
    }

    // ── Screen switching ──────────────────────────────────────
    function showMain() {
      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display  = 'flex';
    }

    function showSetup() {
      document.getElementById('mainScreen').style.display  = 'none';
      document.getElementById('setupScreen').style.display = 'flex';
      // Pre-fill existing values
      document.getElementById('workerUrl').value = localStorage.getItem('st_worker_url') || '';
      document.getElementById('apiKey').value    = localStorage.getItem('st_api_key')    || '';
    }

    // ── Load jobs ─────────────────────────────────────────────
    async function loadJobs() {
      const workerUrl = localStorage.getItem('st_worker_url');
      const apiKey    = localStorage.getItem('st_api_key');
      const btn       = document.getElementById('refreshBtn');

      btn.classList.add('spinning');
      setStats('Loading…');

      try {
        allJobs = await fetchJobs(workerUrl, apiKey);
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        const filtered = filterJobs(allJobs, q);
        renderJobs(filtered, q);
        setStats(`<span>${filtered.length}</span> of ${allJobs.length} jobs`);
      } catch (err) {
        setStats('Failed to load');
        document.getElementById('jobList').innerHTML = `
          <div class="state-msg">
            <span class="icon">⚠️</span>
            <p>${err.message}<br/><br/>Check your Worker URL and API key.</p>
          </div>`;
      } finally {
        btn.classList.remove('spinning');
      }
    }

    async function fetchJobs(workerUrl, apiKey) {
      const res = await fetch(`${workerUrl}`, {
        headers: { 'X-API-Key': apiKey }
      });
      if (!res.ok) throw new Error(`API returned ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      return data.jobs || [];
    }

    // ── Filter ────────────────────────────────────────────────
    function filterJobs(jobs, q) {
      if (!q) return jobs;
      return jobs.filter(j =>
        (j.name   || '').toLowerCase().includes(q) ||
        (j.client || '').toLowerCase().includes(q) ||
        (j.code   || '').toLowerCase().includes(q)
      );
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('searchInput').addEventListener('input', function () {
        const q = this.value.trim().toLowerCase();
        const filtered = filterJobs(allJobs, q);
        renderJobs(filtered, q);
        setStats(`<span>${filtered.length}</span> of ${allJobs.length} jobs`);
      });
    });

    // ── Render ────────────────────────────────────────────────
    function renderJobs(jobs, query) {
      const list = document.getElementById('jobList');
      if (!jobs.length) {
        list.innerHTML = `<div class="state-msg"><span class="icon">🔍</span><p>No jobs match "${escHtml(query)}"</p></div>`;
        return;
      }
      list.innerHTML = jobs.map((job, i) => `
        <div class="job-item" style="animation-delay:${Math.min(i*0.025,0.25)}s"
             onclick="selectJob(${JSON.stringify(job).replace(/"/g,'&quot;')})">
          <div class="job-name">${highlight(job.name || 'Untitled', query)}</div>
          <div class="job-meta">
            ${job.code   ? `<span class="job-code">${escHtml(job.code)}</span>` : ''}
            ${job.client ? `<span class="job-client">${highlight(job.client, query)}</span>` : ''}
          </div>
        </div>`).join('');
    }

    // ── Select job → write subject ────────────────────────────
    function selectJob(job) {
      const subject = job.code ? `[${job.code}] ${job.name}` : job.name;
      if (officeReady && Office.context.mailbox?.item?.subject) {
        Office.context.mailbox.item.subject.setAsync(subject, result => {
          showToast(result.status === Office.AsyncResultStatus.Succeeded
            ? `✓ Subject set`
            : '⚠ Could not set subject');
        });
      } else {
        showToast(`✓ Would set: "${subject.substring(0,40)}"`);
      }
    }

    // ── Helpers ───────────────────────────────────────────────
    function highlight(text, query) {
      if (!query) return escHtml(text);
      return escHtml(text).replace(new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function setStats(html) { document.getElementById('statsCount').innerHTML = html; }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
